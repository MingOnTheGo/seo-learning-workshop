<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习 - SEO学习工坊</title>

  <!-- SEO -->
  <meta name="description" content="系统学习搜索引擎优化30个核心知识点，循序渐进掌握SEO完整体系">
  <meta name="keywords" content="SEO学习,搜索引擎优化教程,SEO基础知识">
  <link rel="canonical" href="https://seo-learning.vercel.app/learn.html">

  <!-- Open Graph -->
  <meta property="og:title" content="学习 - SEO学习工坊">
  <meta property="og:description" content="系统学习SEO核心知识点">
  <meta property="og:url" content="https://seo-learning.vercel.app/learn.html">
  <meta property="og:image" content="https://seo-learning.vercel.app/icon-512.png">

  <!-- Favicon & PWA -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FBBF24">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/minimal.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="logo">
        <span class="logo-icon">📊</span>
        <span>SEO学习工坊</span>
      </a>
      <nav class="nav">
        <a href="learn.html" class="active">学习</a>
        <a href="flashcard.html">闪卡</a>
        <a href="roots.html">索引</a>
        <a href="progress.html">进度</a>
      </nav>
    </div>
  </header>

  <!-- Learn Container -->
  <div class="container">
    <div class="learn-container">
      <div class="learn-card">
        <!-- Learn Header -->
        <div class="learn-header">
          <span class="learn-origin" id="learnOrigin">加载中...</span>
          <span id="learnProgress">1 / 30</span>
        </div>

        <!-- Learn Body -->
        <div class="learn-body">
          <h1 class="learn-meaning" id="learnMeaning">加载中...</h1>
          <p class="learn-description" id="learnDescription">加载中...</p>

          <!-- Examples Section -->
          <div class="examples-section" id="examplesSection">
            <h3>应用案例</h3>
            <div id="examplesContainer"></div>
          </div>

          <!-- Quiz Section -->
          <div class="quiz-container" id="quizSection">
            <h3>小测验</h3>
            <div class="quiz-question">
              <p id="quizQuestion">加载中...</p>
              <div class="quiz-options" id="quizOptions"></div>
              <div class="quiz-explanation" id="quizExplanation" style="display: none;"></div>
            </div>
          </div>
        </div>

        <!-- Learn Footer -->
        <div class="learn-footer">
          <button class="btn btn-secondary" id="markMasteredBtn" onclick="toggleMastered()">
            ✓ 标记为已掌握
          </button>
          <div class="learn-nav">
            <button class="btn btn-secondary" id="prevBtn" onclick="navigate(-1)">← 上一个</button>
            <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)">下一个 →</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/wordData.js"></script>
  <script src="js/siteConfig.js"></script>
  <script src="js/storage.js"></script>
  <script>
    let currentIndex = 0;
    let dataLoaded = false;

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof WordRoots === 'undefined') {
        showToast('数据加载失败，请刷新页面', 'error');
        return;
      }

      dataLoaded = true;
      currentIndex = Storage.getCurrentIndex();
      if (currentIndex >= WordRoots.length) {
        currentIndex = 0;
      }
      loadItem(currentIndex);
    });

    // Load item
    function loadItem(index) {
      if (!dataLoaded || index < 0 || index >= WordRoots.length) return;

      const item = WordRoots[index];

      // Update UI
      document.getElementById('learnOrigin').textContent = item.origin;
      document.getElementById('learnProgress').textContent = `${index + 1} / ${WordRoots.length}`;
      document.getElementById('learnMeaning').textContent = item.meaning;
      document.getElementById('learnDescription').textContent = item.description;

      // Load examples
      const examplesContainer = document.getElementById('examplesContainer');
      examplesContainer.innerHTML = '';
      item.examples.forEach(example => {
        const div = document.createElement('div');
        div.className = 'example-item';
        div.innerHTML = `
          <div class="example-word">${example.word}</div>
          <div style="color: var(--color-text-light);">${example.meaning}</div>
          <div style="margin-top: 0.5rem;">${example.explanation}</div>
        `;
        examplesContainer.appendChild(div);
      });

      // Load quiz
      if (item.quiz) {
        document.getElementById('quizSection').style.display = 'block';
        loadQuiz(item.quiz);
      } else {
        document.getElementById('quizSection').style.display = 'none';
      }

      // Update mastered button
      updateMasteredButton();

      // Update navigation buttons
      document.getElementById('prevBtn').disabled = index === 0;
      document.getElementById('nextBtn').disabled = index === WordRoots.length - 1;
      document.getElementById('prevBtn').style.opacity = index === 0 ? 0.5 : 1;
      document.getElementById('nextBtn').style.opacity = index === WordRoots.length - 1 ? 0.5 : 1;

      // Save current index
      Storage.setCurrentIndex(index);
    }

    // Load quiz
    function loadQuiz(quiz) {
      document.getElementById('quizQuestion').textContent = quiz.question;
      const optionsContainer = document.getElementById('quizOptions');
      optionsContainer.innerHTML = '';
      document.getElementById('quizExplanation').style.display = 'none';

      quiz.options.forEach((option, i) => {
        const div = document.createElement('div');
        div.className = 'quiz-option';
        div.textContent = option;
        div.onclick = () => selectOption(div, i, quiz.correctAnswer);
        optionsContainer.appendChild(div);
      });
    }

    // Select quiz option
    function selectOption(element, index, correctAnswer) {
      const options = document.querySelectorAll('.quiz-option');
      options.forEach(opt => {
        opt.onclick = null;
        opt.classList.remove('selected');
      });

      element.classList.add('selected');

      if (index === correctAnswer) {
        element.classList.add('correct');
        showToast('回答正确！', 'success');
      } else {
        element.classList.add('incorrect');
        options[correctAnswer].classList.add('correct');
        showToast('回答错误，正确答案已标注', 'error');
      }

      // Show explanation if available
      const currentItem = WordRoots[currentIndex];
      if (currentItem.examples && currentItem.examples[0]) {
        const explanation = document.getElementById('quizExplanation');
        explanation.innerHTML = `<strong>解析：</strong>${currentItem.description}`;
        explanation.style.display = 'block';
      }
    }

    // Navigate
    function navigate(direction) {
      const newIndex = currentIndex + direction;
      if (newIndex >= 0 && newIndex < WordRoots.length) {
        currentIndex = newIndex;
        loadItem(currentIndex);
        window.scrollTo(0, 0);
      }
    }

    // Toggle mastered
    function toggleMastered() {
      if (!dataLoaded) return;

      const item = WordRoots[currentIndex];
      const isMastered = Storage.isMastered(item.id);

      if (Storage.setMastered(item.id, !isMastered)) {
        updateMasteredButton();
        showToast(isMastered ? '已取消标记' : '已标记为已掌握', 'success');
      } else {
        showToast('操作失败', 'error');
      }
    }

    // Update mastered button
    function updateMasteredButton() {
      if (!dataLoaded) return;

      const item = WordRoots[currentIndex];
      const isMastered = Storage.isMastered(item.id);
      const btn = document.getElementById('markMasteredBtn');

      if (isMastered) {
        btn.textContent = '✓ 已掌握';
        btn.classList.add('btn-primary');
        btn.classList.remove('btn-secondary');
      } else {
        btn.textContent = '✓ 标记为已掌握';
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-secondary');
      }
    }

    // Toast notification
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT') return;

      if (e.key === 'ArrowLeft') {
        navigate(-1);
      } else if (e.key === 'ArrowRight') {
        navigate(1);
      } else if (e.key === 'm') {
        toggleMastered();
      }
    });
  </script>
</body>
</html>
